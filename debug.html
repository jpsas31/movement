<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movement Debug</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #111; overflow: hidden; font-family: monospace; }
    #grid {
      display: flex;
      width: 100vw;
      height: 100vh;
    }
    .panel {
      flex: 1;
      position: relative;
      border-right: 1px solid #333;
    }
    .panel:last-child { border-right: none; }
    .panel canvas { width: 100%; height: 100%; display: block; }
    .panel-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      right: 8px;
      color: rgba(255,255,255,0.75);
      font-size: 11px;
      pointer-events: none;
      z-index: 5;
      text-shadow: 0 1px 3px rgba(0,0,0,0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85); color: white;
      font-family: sans-serif; font-size: 18px; cursor: pointer; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="grid"></div>
  <div id="overlay">
    <div style="font-size:40px;margin-bottom:12px">🔬</div>
    <div>Click to start debug view</div>
    <div style="font-size:12px;margin-top:6px;opacity:0.5">Mic to start · A = audio · O = options · N/B = compare scenes (same as main preset keys) · PgUp/PgDn also</div>
  </div>
  <script type="module" src="/src/debug.ts"></script>
</body>
</html>
